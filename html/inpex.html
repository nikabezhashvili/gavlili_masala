src - გამოიყენება წყაროს დასამატებლად

id - გამოიყენება უნიკალური სახელის მინიჭებისთვის

selected - გამოიყენება ჩამოსაშლელ სიაში წინასწარ არჩეული ვარიანტის დასაყენებლად

height - გამოიყენება სურათისთვის კონკრეტული სიმაღლის მითითებისთვის

style - გამოიყენება ელემენტისთვის სტილის მიცემისთვის(inline)

required - გამოიყენება სარეგისტრაციო ფორმაში და მომხმარებელს ამ ატრიბუტით ვუთითებთ რომ ამ ინფორმაციის შეყვანა აუცილებელია
